<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат — PIPISKAgpt</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #4ade80;
            --text: #f4f4f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Geist', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .chat-container { width: 100%; max-width: 900px; flex: 1; display: flex; flex-direction: column; gap: 20px; overflow: hidden; }
        
        .messages-area {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: none;
        }
        .messages-area::-webkit-scrollbar { display: none; }

        .msg { max-width: 80%; padding: 16px 22px; border-radius: 30px; line-height: 1.5; font-size: 0.95rem; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; border-bottom-right-radius: 8px; }
        .ai { align-self: flex-start; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 8px; }

        .input-area {
            display: flex; gap: 12px; padding: 10px 10px 10px 25px; margin-bottom: 20px;
            background: var(--glass); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px;
        }
        
        input { flex: 1; background: transparent; border: none; color: #white; outline: none; font-size: 1rem; }
        
        .send-btn {
            background: var(--text); border: none; width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .send-btn:hover:not(:disabled) { background: var(--accent); transform: scale(1.05); }

        .typing { font-size: 0.8rem; color: var(--accent); margin-left: 20px; height: 20px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="messages-area" id="chat">
            <div class="msg ai">Привет! Я PIPISKAgpt. Чем могу помочь?</div>
        </div>
        <div id="typing" class="typing"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <i data-lucide="arrow-up" color="#000"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingDiv = document.getElementById('typing');
        let isWaiting = false;

        function addMessage(role, text) {
            const m = document.createElement('div');
            m.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            m.innerText = text;
            chatDiv.appendChild(m);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg || isWaiting) return;

            addMessage('user', msg);
            input.value = '';
            isWaiting = true;
            sendBtn.disabled = true;
            typingDiv.innerText = 'PIPISKAgpt думает...';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                typingDiv.innerText = '';
                addMessage('assistant', data.response || 'Произошла ошибка.');
            } catch (e) {
                typingDiv.innerText = '';
                addMessage('assistant', 'Ошибка сети. Попробуйте позже.');
            } finally {
                isWaiting = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
