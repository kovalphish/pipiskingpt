<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат — PIPISKAgpt</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #050508; --glass: rgba(255, 255, 255, 0.03); --accent: #4ade80; --text: #f4f4f5; }
        [data-theme="light"] { --bg: #f5f5f7; --glass: rgba(0, 0, 0, 0.03); --text: #1a1a1e; --accent: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Geist', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px 20px; transition: 0.3s; }
        
        nav { width: 100%; max-width: 850px; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); }
        nav a { color: var(--text); text-decoration: none; font-size: 0.85rem; opacity: 0.5; }
        
        .chat-wrap { width: 100%; max-width: 850px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        
        .msg { 
            max-width: 85%; 
            padding: 14px 22px; 
            border-radius: 28px; 
            line-height: 1.5; 
            font-size: 0.95rem; 
            /* ФИКСЫ ТУТ: */
            word-wrap: break-word;       /* Разрывать длинные слова */
            overflow-wrap: break-word;   /* Дополнительная поддержка переноса */
            white-space: pre-wrap;       /* Сохранять переносы строк, но переносить текст по ширине */
            display: inline-block;       /* Чтобы блок подстраивался под контент правильно */
        }
        
        .ai { 
            align-self: flex-start; 
            background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-bottom-left-radius: 4px;
            width: fit-content;          /* Чтобы блок не растягивался на всю ширину зря */
        }
        
        /* Фикс для инпута, чтобы текст был белым и не слипался */
        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #ffffff !important;   /* Принудительно белый текст */
            outline: none; 
            font-size: 1rem;
            padding-right: 10px;
        }

        .input-box { display: flex; gap: 12px; padding: 10px 10px 10px 25px; background: var(--glass); border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        /* Исправлен цвет текста */
        input { flex: 1; background: transparent; border: none; color: var(--text); outline: none; font-size: 1rem; }
        .send { background: var(--text); color: var(--bg); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .typing { font-size: 0.8rem; color: var(--accent); margin-left: 25px; height: 20px; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 800; color: var(--accent);">PIPISKAgpt</div>
        <div style="display: flex; gap: 15px;">
            <a href="/">Главная</a>
            <a href="/feedback">ОтзыTTвы</a>
            <a href="/dashboard">Профиль</a>
        </div>
    </nav>

    <div class="chat-wrap">
        <div class="messages" id="chat">
            <div class="msg ai">Привет! Напиши что-нибудь, и я отвечу.</div>
        </div>
        <div id="status" class="typing"></div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Спроси меня о чем угодно..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send" id="sendBtn" onclick="sendMessage()"><i data-lucide="arrow-up" size="20"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const status = document.getElementById('status');
        let isWaiting = false;

        async function typeMessage(el, text) {
            el.innerText = '';
            for (let char of text) {
                el.innerText += char;
                chatDiv.scrollTop = chatDiv.scrollHeight;
                await new Promise(r => setTimeout(r, 15));
            }
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg || isWaiting) return;

            const uMsg = document.createElement('div');
            uMsg.className = 'msg user';
            uMsg.innerText = msg;
            chatDiv.appendChild(uMsg);
            
            input.value = '';
            isWaiting = true;
            status.innerText = 'Печатает...';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                status.innerText = '';
                
                const aiMsg = document.createElement('div');
                aiMsg.className = 'msg ai';
                chatDiv.appendChild(aiMsg);
                await typeMessage(aiMsg, data.response || 'Ошибка');
            } catch (e) {
                status.innerText = 'Ошибка соединения';
            } finally {
                isWaiting = false;
            }
        }
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    </script>
</body>
</html>
