<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIPISKAgpt — Crystal AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #4ade80;
            --text: #f4f4f5;
        }
        [data-theme="light"] {
            --bg: #f5f5f7;
            --glass: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.08);
            --accent: #10b981;
            --text: #1a1a1e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Geist', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s; }
        
        .glass { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 40px; }
        
        nav { width: 100%; max-width: 800px; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        .logo { font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-size: 0.85rem; opacity: 0.6; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        .hero { text-align: center; padding: 80px 40px; max-width: 700px; width: 100%; margin-bottom: 30px; }
        h1 { font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 20px; }
        .btn { background: var(--text); color: var(--bg); padding: 18px 40px; border-radius: 100px; text-decoration: none; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn:hover { background: var(--accent); transform: translateY(-3px); }

        .theme-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="glass">
        <div class="logo"><i data-lucide="zap"></i> PIPISKAgpt</div>
        <div class="nav-links">
            <a href="/">Главная</a>
            <a href="/chat">Чат</a>
            <a href="/feedback">Отзывы</a>
            <a href="/dashboard">Профиль</a>
            <button class="theme-btn" onclick="toggleTheme()">Тема</button>
        </div>
    </nav>

    <div class="hero glass">
        <h1>Pure. Fluid. AI.</h1>
        <p style="margin-bottom: 30px; opacity: 0.7;">Бесплатный AI-ассистент на базе MiniMax M2.5 с контекстом 197K.</p>
        <a href="/chat" class="btn">Начать общение <i data-lucide="arrow-right"></i></a>
    </div>

    <script>
        lucide.createIcons();
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        }
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    </script>
</body>
</html>
