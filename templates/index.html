<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek - Бесплатный AI чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f5f5;
            --surface: white;
            --text: #1a1a2e;
            --text-light: #666;
            --border: #e0e0e0;
            --accent: #0d6efd;
            --accent-hover: #0b5ed7;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --surface: #2d2d2d;
            --text: #e9ecef;
            --text-light: #adb5bd;
            --border: #404040;
            --accent: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .nav a:hover {
            color: var(--accent);
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.25rem;
        }

        .theme-btn {
            background: none;
            border: none;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .theme-btn.active {
            background: var(--accent);
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 1rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            color: var(--text-light);
            font-size: 1.125rem;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .feature {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
        }

        .feature h3 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .feature p {
            font-size: 0.875rem;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.75rem;
            }
            .theme-toggle {
                top: 0.5rem;
                right: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button class="theme-btn" onclick="setTheme('light')">Светлая</button>
        <button class="theme-btn" onclick="setTheme('dark')">Темная</button>
    </div>

    <div class="header">
        <h1>DeepSeek Chat</h1>
        <div class="nav">
            <a href="/" style="color: var(--accent);">Главная</a>
            <a href="/chat">Чат</a>
            <a href="/feedback">Отзывы</a>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>DeepSeek</h1>
            <p>Бесплатный AI-ассистент на базе MiniMax M2.5</p>
            <a href="/chat" class="btn">Начать общение</a>
        </div>

        <div class="features">
            <div class="feature">
                <h3>MiniMax M2.5</h3>
                <p>Лучшая бесплатная модель, 197K контекста</p>
            </div>
            <div class="feature">
                <h3>Авто fallback</h3>
                <p>При недоступности — резервные модели</p>
            </div>
            <div class="feature">
                <h3>Светлая/темная тема</h3>
                <p>Комфорт в любое время суток</p>
            </div>
        </div>
    </div>

    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const btns = document.querySelectorAll('.theme-btn');
            btns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === theme) {
                    btn.classList.add('active');
                }
            });
        }

        setTheme(localStorage.getItem('theme') || 'light');
    </script>
</body>
</html>
