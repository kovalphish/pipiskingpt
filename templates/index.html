<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат — PIPISKAgpt</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #050508; --glass: rgba(255, 255, 255, 0.03); --accent: #4ade80; --text: #f4f4f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Geist', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px 20px; }
        
        .glass { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; }
        
        /* Навигация (Добавлена) */
        nav { width: 100%; max-width: 800px; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        nav a { color: var(--text); text-decoration: none; font-size: 0.85rem; opacity: 0.5; transition: 0.3s; }
        nav a:hover { opacity: 1; color: var(--accent); }

        .chat-container { width: 100%; max-width: 800px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 28px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; font-weight: 500; }
        .ai { align-self: flex-start; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        .input-area { display: flex; gap: 12px; padding: 10px 10px 10px 25px; background: var(--glass); border-radius: 100px; margin-bottom: 10px; }
        
        /* Фикс черного текста */
        input { flex: 1; background: transparent; border: none; color: #ffffff; outline: none; font-size: 1rem; }
        input::placeholder { color: rgba(255,255,255,0.3); }
        
        .send-btn { background: var(--text); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn:disabled { opacity: 0.3; }

        .status-info { font-size: 0.75rem; color: var(--accent); margin-left: 25px; height: 20px; opacity: 0.7; }
    </style>
</head>
<body>
    <nav class="glass">
        <div style="font-weight: 800; color: var(--accent);">PIPISKAgpt</div>
        <div style="display: flex; gap: 20px;">
            <a href="/">Главная</a>
            <a href="/feedback">Отзывы</a>
        </div>
    </nav>

    <div class="chat-container">
        <div class="messages-area" id="chat">
            <div class="msg ai">Привет! Я готов к работе. О чем сегодня поговорим?</div>
        </div>
        <div id="status" class="status-info"></div>
        <div class="input-area glass">
            <input type="text" id="userInput" placeholder="Напишите ваш вопрос..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <i data-lucide="arrow-up" size="20" color="#000"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const status = document.getElementById('status');
        let isWaiting = false;

        function addMessage(role, text) {
            const m = document.createElement('div');
            m.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            m.innerText = text;
            chatDiv.appendChild(m);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            return m;
        }

        // Эффект плавного написания текста
        async function typeMessage(element, text) {
            element.innerText = '';
            for (let i = 0; i < text.length; i++) {
                element.innerText += text.charAt(i);
                chatDiv.scrollTop = chatDiv.scrollHeight;
                await new Promise(r => setTimeout(r, 15)); // Скорость печати
            }
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg || isWaiting) return;

            addMessage('user', msg);
            input.value = '';
            isWaiting = true;
            status.innerText = 'Нейронка генерирует ответ...';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                status.innerText = '';
                
                const aiMsg = addMessage('ai', ''); 
                await typeMessage(aiMsg, data.response || 'Произошла ошибка.');
            } catch (e) {
                status.innerText = '';
                addMessage('ai', 'Ошибка сети.');
            } finally {
                isWaiting = false;
            }
        }
    </script>
</body>
</html>
