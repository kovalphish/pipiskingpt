<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIPISKAgpt — Crystal AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Палитра Deep Ocean */
            --bg: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #4ade80; /* Мятно-зеленый для свежести */
            --glow: rgba(74, 222, 128, 0.15);
            --text: #f4f4f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Geist', sans-serif;
        }

        body {
            background-color: var(--bg);
            /* Сложный градиент для объема стекла */
            background-image: 
                radial-gradient(at 0% 0%, rgba(76, 29, 149, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(13, 148, 136, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 40px; /* Экстремальное закругление */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav {
            width: 100%;
            max-width: 600px;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.5;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        .hero {
            text-align: center;
            padding: 60px 40px;
            max-width: 700px;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 20px;
            line-height: 1;
        }

        .hero p {
            font-size: 1.1rem;
            font-weight: 300;
            color: #a1a1aa;
            margin-bottom: 40px;
        }

        .btn {
            background: var(--text);
            color: var(--bg);
            padding: 16px 35px;
            border-radius: 100px; /* Полный овал */
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--glow);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 700px;
        }

        .card {
            padding: 30px 20px;
            text-align: center;
        }

        .card i {
            color: var(--accent);
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .card h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 0.75rem;
            color: #71717a;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav class="nav glass-card">
        <div class="logo">
            <i data-lucide="sparkles" size="20"></i> PIPISKAgpt
        </div>
        <div class="nav-links">
            <a href="/chat">Chat</a>
            <a href="/feedback">Feed</a>
            <a href="/dashboard"><i data-lucide="circle-user-round" size="20"></i></a>
        </div>
    </nav>

    <div class="hero glass-card">
        <h1>Pure. Fluid. AI.</h1>
        <p>Минималистичный доступ к MiniMax M2.5. <br> Ничего лишнего, только интеллект.</p>
        <a href="/chat" class="btn">
            Запустить чат <i data-lucide="arrow-up-right" size="20"></i>
        </a>
    </div>

    <div class="grid">
        <div class="card glass-card">
            <i data-lucide="zap"></i>
            <h3>Speed</h3>
            <p>Мгновенный отклик</p>
        </div>
        <div class="card glass-card">
            <i data-lucide="box"></i>
            <h3>Context</h3>
            <p>197K токенов</p>
        </div>
        <div class="card glass-card">
            <i data-lucide="fingerprint"></i>
            <h3>Private</h3>
            <p>Без логов</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
