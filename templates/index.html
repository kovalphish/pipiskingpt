<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIPISKAgpt — Crystal Clear AI</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --accent: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1a1a2e, #16213e);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Эффект жидкого стекла */
        .liquid-glass {
            background: var(--glass);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .navbar {
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
            color: var(--accent);
        }

        .hero {
            margin-top: 100px;
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            opacity: 0.6;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-main {
            padding: 12px 30px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
            margin-top: 50px;
        }

        .feature-card {
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .feature-card i {
            margin-bottom: 10px;
            color: var(--accent);
        }

        .feature-card h3 {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .feature-card p {
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <nav class="navbar liquid-glass">
        <div class="logo">
            <i data-lucide="zap"></i> PIPISKAgpt
        </div>
        <div class="nav-links">
            <a href="/chat">Чат</a>
            <a href="/feedback">Отзывы</a>
            <a href="/dashboard"><i data-lucide="user" size="18"></i></a>
        </div>
    </nav>

    <div class="hero liquid-glass">
        <h1>PIPISKAgpt</h1>
        <p>Чистый интеллект в прозрачной оболочке. <br> Работает на базе MiniMax M2.5 с мгновенным откликом.</p>
        <a href="/chat" class="btn-main">
            Начать <i data-lucide="arrow-right" size="18"></i>
        </a>
    </div>

    <div class="features">
        <div class="feature-card liquid-glass">
            <i data-lucide="cpu"></i>
            <h3>M2.5 Core</h3>
            <p>197K контекста</p>
        </div>
        <div class="feature-card liquid-glass">
            <i data-lucide="shield-check"></i>
            <h3>Safe AI</h3>
            <p>Конфиденциально</p>
        </div>
        <div class="feature-card liquid-glass">
            <i data-lucide="layers"></i>
            <h3>Fallback</h3>
            <p>Всегда онлайн</p>
        </div>
    </div>

    <script>
        // Активация иконок
        lucide.createIcons();
    </script>
</body>
</html>
