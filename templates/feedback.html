<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы — PIPISKAgpt</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #050508; --glass: rgba(255, 255, 255, 0.03); --accent: #4ade80; --text: #f4f4f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Geist', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .card { width: 100%; max-width: 500px; padding: 50px; background: var(--glass); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 45px; }
        h2 { font-size: 2rem; margin-bottom: 30px; text-align: center; letter-spacing: -1px; }

        .input-group { margin-bottom: 20px; }
        .label { display: block; margin-bottom: 8px; font-size: 0.8rem; opacity: 0.6; margin-left: 15px; }
        
        .field { 
            width: 100%; padding: 18px 25px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; 
            color: #fff; outline: none; transition: 0.3s; font-size: 1rem;
        }
        .field:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }

        .rating { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-direction: row-reverse; }
        .rating input { display: none; }
        .rating label { font-size: 30px; color: #333; cursor: pointer; transition: 0.3s; }
        .rating input:checked ~ label, .rating label:hover, .rating label:hover ~ label { color: var(--accent); }

        .submit-btn { width: 100%; padding: 20px; border-radius: 100px; border: none; background: var(--text); font-weight: 800; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: var(--accent); transform: scale(1.02); }
        .status { text-align: center; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Оставить отзыв</h2>
        <div class="input-group">
            <span class="label">Имя</span>
            <input type="text" id="name" class="field" placeholder="Как вас зовут?">
        </div>
        <div class="input-group">
            <span class="label">Сообщение</span>
            <textarea id="message" class="field" rows="4" placeholder="Ваши впечатления..."></textarea>
        </div>
        
        <div class="rating">
            <input type="radio" name="star" id="s5" value="5"><label for="s5">★</label>
            <input type="radio" name="star" id="s4" value="4"><label for="s4">★</label>
            <input type="radio" name="star" id="s3" value="3"><label for="s3">★</label>
            <input type="radio" name="star" id="s2" value="2"><label for="s2">★</label>
            <input type="radio" name="star" id="s1" value="1"><label for="s1">★</label>
        </div>

        <button class="submit-btn" onclick="sendFeedback()">Отправить</button>
        <div id="status" class="status"></div>
        <div style="text-align: center; margin-top: 20px;">
            <a href="/" style="color: #555; text-decoration: none; font-size: 0.8rem;">← Назад</a>
        </div>
    </div>

    <script>
        async function sendFeedback() {
            const name = document.getElementById('name').value;
            const message = document.getElementById('message').value;
            const rating = document.querySelector('input[name="star"]:checked')?.value || 5;
            const status = document.getElementById('status');

            if(!name || !message) { status.innerText = 'Заполните поля'; return; }

            try {
                const res = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, message, rating })
                });
                if(res.ok) {
                    status.style.color = '#4ade80';
                    status.innerText = 'Отзыв отправлен!';
                }
            } catch (e) { status.innerText = 'Ошибка отправки'; }
        }
    </script>
</body>
</html>
