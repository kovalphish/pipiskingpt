<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы - DeepSeek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f8f9fa;
            --surface-color: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
            --accent: #0d6efd;
            --accent-hover: #0b5ed7;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --surface-color: #2d2d2d;
            --text-primary: #e9ecef;
            --text-secondary: #adb5bd;
            --border-color: #404040;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            border-bottom: 1px solid var(--border-color);
            background-color: var(--surface-color);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .theme-toggle {
            display: flex;
            gap: 0.25rem;
            background-color: var(--bg-color);
            border-radius: 0.375rem;
            padding: 0.25rem;
        }

        .theme-btn {
            background: none;
            border: none;
            padding: 0.375rem 0.75rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .theme-btn.active {
            background-color: var(--surface-color);
            color: var(--text-primary);
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .form-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
        }

        .form-title {
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: inherit;
        }

        .rating-group {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .rating-group input {
            display: none;
        }

        .rating-group label {
            cursor: pointer;
            color: #dee2e6;
            font-size: 1.5rem;
            margin: 0;
        }

        .rating-group label:hover,
        .rating-group label:hover ~ label,
        .rating-group input:checked ~ label {
            color: #f59e0b;
        }

        button[type="submit"] {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 500;
        }

        .flash-message {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            color: white;
        }

        .flash-success {
            background-color: #10b981;
        }

        .flash-error {
            background-color: #ef4444;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">DeepSeek</a>
            <div class="nav-links">
                <a href="/">Главная</a>
                <a href="/chat">Чат</a>
                <a href="/feedback">Отзывы</a>
                {% if user and user.is_authenticated %}
                    <a href="/dashboard">Профиль</a>
                    <a href="/logout" class="btn btn-outline">Выйти</a>
                {% else %}
                    <a href="/login" class="btn btn-primary">Войти</a>
                {% endif %}
                <div class="theme-toggle">
                    <button class="theme-btn" onclick="setTheme('light')">Светлая</button>
                    <button class="theme-btn" onclick="setTheme('dark')">Темная</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h1 class="form-title">Оставить отзыв</h1>
            <form method="POST">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" name="name" value="{{ user.name if user and user.is_authenticated else '' }}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ user.email if user and user.is_authenticated else '' }}" required>
                </div>
                <div class="form-group">
                    <label>Оценка</label>
                    <div class="rating-group">
                        <input type="radio" name="rating" value="5" id="star5" checked><label for="star5">★</label>
                        <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
                        <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
                        <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
                        <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Сообщение</label>
                    <textarea name="message" rows="5" required placeholder="Поделитесь впечатлениями"></textarea>
                </div>
                <button type="submit">Отправить</button>
            </form>
        </div>
    </div>

    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const btns = document.querySelectorAll('.theme-btn');
            btns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === theme) {
                    btn.classList.add('active');
                }
            });
        }
        setTheme(localStorage.getItem('theme') || 'light');
    </script>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
            <div class="flash-message flash-{{ cat }}">{{ msg }}</div>
            <script>setTimeout(() => document.querySelector('.flash-message')?.remove(), 3000);</script>
        {% endfor %}
    {% endwith %}
</body>
</html>
