<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь - DeepSeek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f5f5;
            --surface: white;
            --text: #1a1a2e;
            --text-light: #666;
            --border: #e0e0e0;
            --accent: #0d6efd;
            --accent-hover: #0b5ed7;
            --success: #10b981;
            --error: #ef4444;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --surface: #2d2d2d;
            --text: #e9ecef;
            --text-light: #adb5bd;
            --border: #404040;
            --accent: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .nav a:hover {
            color: var(--accent);
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.25rem;
        }

        .theme-btn {
            background: none;
            border: none;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .theme-btn.active {
            background: var(--accent);
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .rating-group {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .rating-group input {
            display: none;
        }

        .rating-group label {
            cursor: pointer;
            color: #dee2e6;
            font-size: 1.75rem;
            margin: 0;
            transition: color 0.2s;
        }

        .rating-group label:hover,
        .rating-group label:hover ~ label,
        .rating-group input:checked ~ label {
            color: #f59e0b;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            color: white;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .message-success {
            background: var(--success);
        }

        .message-error {
            background: var(--error);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .form-card {
                padding: 1.5rem;
            }
            .theme-toggle {
                top: 0.5rem;
                right: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button class="theme-btn" onclick="setTheme('light')">Светлая</button>
        <button class="theme-btn" onclick="setTheme('dark')">Темная</button>
    </div>

    <div class="header">
        <h1>DeepSeek Chat</h1>
        <div class="nav">
            <a href="/">Главная</a>
            <a href="/chat">Чат</a>
            <a href="/feedback" style="color: var(--accent);">Отзывы</a>
        </div>
    </div>

    <div class="container">
        <div class="form-card">
            <h2 class="form-title">Обратная связь</h2>
            <form id="feedbackForm">
                <div class="form-group">
                    <label>Ваше имя</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Оценка</label>
                    <div class="rating-group">
                        <input type="radio" name="rating" value="5" id="star5" checked><label for="star5">★</label>
                        <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
                        <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
                        <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
                        <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Ваше сообщение</label>
                    <textarea id="message" rows="5" required placeholder="Поделитесь впечатлениями..."></textarea>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Отправить отзыв</button>
            </form>
        </div>
    </div>

    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const btns = document.querySelectorAll('.theme-btn');
            btns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === theme) {
                    btn.classList.add('active');
                }
            });
        }

        setTheme(localStorage.getItem('theme') || 'light');

        function showMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message message-${type}`;
            msg.textContent = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();
            const rating = document.querySelector('input[name="rating"]:checked').value;
            
            if (!name || !email || !message) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';
            
            try {
                const res = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, message, rating })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showMessage(data.message || 'Спасибо за отзыв!', 'success');
                    document.getElementById('feedbackForm').reset();
                    document.getElementById('star5').checked = true;
                } else {
                    showMessage(data.error || 'Ошибка отправки', 'error');
                }
            } catch (err) {
                showMessage('Ошибка соединения', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Отправить отзыв';
            }
        });
    </script>
</body>
</html>
